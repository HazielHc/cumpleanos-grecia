<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cumpleaños Grecia</title>
  <meta name="description" content="Cuenta regresiva elegante para el Cumpleaños Grecia el 14 de mayo de 2026.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ivory: #f8f7f2;
      --off: #f2f0ea;
      --mist: #dce9ef;
      --mist-deep: #8fa9b8;
      --sage: #dce8df;
      --sage-mid: #b7caa7;
      --sage-deep: #56724f;
      --text: #2e3831;
      --muted: #8b958c;
      --line: rgba(160, 183, 196, 0.42);
      --glass: rgba(255, 255, 255, 0.28);
      --glass-strong: rgba(255, 255, 255, 0.36);
      --shadow: 0 18px 56px rgba(95, 121, 104, 0.12);
      --mobile-width: 430px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Jost", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 16% 18%, rgba(255, 255, 255, 0.92), transparent 28%),
        radial-gradient(circle at 80% 14%, rgba(220, 233, 239, 0.78), transparent 30%),
        radial-gradient(circle at 52% 74%, rgba(201, 220, 198, 0.64), transparent 32%),
        linear-gradient(180deg, #f9f8f4 0%, #eef4f4 46%, #dce9ef 100%);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .scene {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      isolation: isolate;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
    }

    .backdrop::before,
    .backdrop::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(42px);
      opacity: 0.48;
    }

    .backdrop::before {
      width: 34vw;
      height: 34vw;
      max-width: 320px;
      max-height: 320px;
      top: 6%;
      right: 2%;
      background: rgba(214, 231, 239, 0.48);
    }

    .backdrop::after {
      width: 44vw;
      height: 44vw;
      max-width: 360px;
      max-height: 360px;
      bottom: 10%;
      left: 10%;
      background: rgba(197, 219, 190, 0.34);
    }

    .florals {
      display: none;
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      overflow: hidden;
    }

    .flower {
      position: absolute;
      opacity: 0.95;
      filter: drop-shadow(0 18px 18px rgba(105, 131, 96, 0.12));
      transform-origin: center;
    }

    .flower svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .flower-top-right {
      width: 168px;
      right: 18px;
      top: 30px;
      transform: rotate(3deg);
    }

    .flower-left-mid {
      width: 118px;
      left: -10px;
      top: 250px;
      transform: rotate(-12deg);
      opacity: 0.92;
    }

    .flower-bottom-left {
      width: 132px;
      left: -12px;
      bottom: 100px;
      transform: rotate(-8deg);
    }

    .flower-bottom-right {
      width: 156px;
      right: -8px;
      bottom: 56px;
      transform: rotate(4deg);
    }

    .card {
      width: min(100%, var(--mobile-width));
      padding: 34px 20px 28px;
      border-radius: 34px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0.19)),
        linear-gradient(140deg, rgba(248, 247, 242, 0.66), rgba(216, 233, 239, 0.5));
      border: 1px solid rgba(255, 255, 255, 0.62);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px) saturate(120%);
      -webkit-backdrop-filter: blur(20px) saturate(120%);
      text-align: center;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 33px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: auto 10% 12% 10%;
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(191, 213, 183, 0.24), transparent 68%);
      filter: blur(30px);
      pointer-events: none;
    }

    .reveal {
      opacity: 0;
      transform: translateY(16px);
      animation: rise 900ms cubic-bezier(.2, .7, .2, 1) forwards;
    }

    .delay-1 { animation-delay: 120ms; }
    .delay-2 { animation-delay: 210ms; }
    .delay-3 { animation-delay: 320ms; }
    .delay-4 { animation-delay: 430ms; }
    .delay-5 { animation-delay: 540ms; }
    .delay-6 { animation-delay: 650ms; }

    h1 {
      margin: 6px 0 0;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(3.35rem, 12vw, 4.85rem);
      line-height: 0.92;
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin: 14px 0 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 1.95rem;
      font-style: italic;
      font-weight: 300;
      color: rgba(112, 124, 118, 0.9);
    }

    .eyebrow {
      margin: 18px 0 0;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.46em;
      text-transform: uppercase;
      color: var(--mist-deep);
      padding-left: 0.46em;
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 20px 0 24px;
      color: rgba(143, 169, 184, 0.82);
    }

    .divider::before,
    .divider::after {
      content: "";
      width: min(30vw, 126px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line), transparent);
    }

    .divider svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin: 0 0 24px;
    }

    .time-card {
      min-height: 140px;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 10px;
      padding: 18px 10px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0.16));
      border: 1px solid rgba(255, 255, 255, 0.55);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.48);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .value {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(3.45rem, 12vw, 4.2rem);
      line-height: 0.86;
      font-weight: 300;
      letter-spacing: 0.03em;
      font-variant-numeric: tabular-nums lining-nums;
    }

    .label {
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: rgba(115, 126, 121, 0.94);
      padding-left: 0.34em;
    }

    .progress-wrap {
      width: 100%;
      margin: 0 auto;
    }

    .progress-track {
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.44);
      border: 1px solid rgba(255, 255, 255, 0.62);
      overflow: hidden;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(112, 146, 132, 0.95), rgba(132, 171, 193, 0.95));
      transition: width 900ms ease;
      box-shadow: 0 0 18px rgba(143, 169, 184, 0.22);
    }

    .progress-copy {
      display: flex;
      justify-content: center;
      margin-top: 12px;
      font-size: 0.94rem;
      color: rgba(120, 133, 126, 0.92);
      letter-spacing: 0.08em;
    }

    .progress-copy span:first-child {
      display: none;
    }

    .message {
      margin: 18px auto 0;
      max-width: 16ch;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.05rem, 7vw, 2.6rem);
      line-height: 1.02;
      font-style: italic;
      color: rgba(68, 95, 73, 0.96);
    }

    .date-badge {
      width: fit-content;
      max-width: 100%;
      margin: 28px auto 0;
      padding: 12px 24px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.62);
      color: rgba(120, 129, 122, 0.94);
      font-size: 0.88rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      white-space: nowrap;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .footer-note {
      margin-top: 12px;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      color: rgba(120, 133, 126, 0.76);
    }

    .audio-toggle {
      margin: 18px auto 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 20px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.34);
      color: var(--sage-deep);
      font-family: "Jost", sans-serif;
      font-size: 0.92rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 10px 28px rgba(95, 121, 104, 0.14);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      cursor: pointer;
    }

    .audio-toggle[hidden] {
      display: none;
    }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (min-width: 720px) {
      .scene {
        padding: 36px;
      }

      .card {
        width: min(100%, 760px);
        padding: 52px 44px 36px;
      }

      h1 {
        font-size: clamp(4.8rem, 9vw, 6.5rem);
      }

      .subtitle {
        font-size: 2.1rem;
      }

      .eyebrow {
        font-size: 0.9rem;
        margin-top: 20px;
      }

      .countdown {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 18px;
        margin-bottom: 26px;
      }

      .time-card {
        min-height: 172px;
      }

      .value {
        font-size: clamp(4rem, 7vw, 5rem);
      }

      .message {
        max-width: 26ch;
        font-size: 2.1rem;
      }

      .flower-top-right {
        width: 230px;
        right: 54px;
        top: 18px;
      }

      .flower-left-mid {
        width: 146px;
        left: 14px;
        top: 250px;
      }

      .flower-bottom-left {
        width: 170px;
        left: 42px;
        bottom: 54px;
      }

      .flower-bottom-right {
        width: 210px;
        right: 24px;
        bottom: 28px;
      }
    }

    @media (max-width: 420px) {
      .scene {
        padding: 14px;
      }

      .card {
        padding: 26px 16px 24px;
        border-radius: 28px;
      }

      .card::before {
        border-radius: 27px;
      }

      h1 {
        font-size: clamp(3rem, 15vw, 4rem);
      }

      .subtitle {
        font-size: 1.65rem;
      }

      .eyebrow {
        font-size: 0.82rem;
      }

      .time-card {
        min-height: 128px;
        border-radius: 21px;
      }

      .label {
        font-size: 0.78rem;
      }

      .date-badge {
        font-size: 0.78rem;
        letter-spacing: 0.2em;
      }

      .flower-top-right {
        width: 146px;
        right: 0;
        top: 52px;
      }

      .flower-left-mid {
        width: 98px;
        left: -18px;
        top: 246px;
      }

      .flower-bottom-left {
        width: 114px;
        left: -18px;
        bottom: 110px;
      }

      .flower-bottom-right {
        width: 138px;
        right: -18px;
        bottom: 44px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .reveal {
        opacity: 1;
        transform: none;
        animation: none;
      }

      .progress-bar {
        transition: none;
      }
    }
  </style>
</head>

  <script>
    (function () {
      const timeZone = "America/Monterrey";
      const eventDateParts = { year: 2026, month: 5, day: 14, hour: 0, minute: 0, second: 0 };
      const startDateParts = { year: 2025, month: 5, day: 14, hour: 0, minute: 0, second: 0 };
      const timeZoneFormatter = new Intl.DateTimeFormat("en-CA", {
        timeZone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hourCycle: "h23"
      });

      function getTimeZoneDateParts(date) {
        const mappedParts = {};

        for (const part of timeZoneFormatter.formatToParts(date)) {
          if (part.type !== "literal") {
            mappedParts[part.type] = Number(part.value);
          }
        }

        return {
          year: mappedParts.year,
          month: mappedParts.month,
          day: mappedParts.day,
          hour: mappedParts.hour,
          minute: mappedParts.minute,
          second: mappedParts.second
        };
      }

      function getTimeZoneOffsetMs(date) {
        const parts = getTimeZoneDateParts(date);
        const zonedAsUtc = Date.UTC(
          parts.year,
          parts.month - 1,
          parts.day,
          parts.hour,
          parts.minute,
          parts.second
        );

        return zonedAsUtc - date.getTime();
      }

      function getZonedTimestamp(parts) {
        const utcGuess = Date.UTC(
          parts.year,
          parts.month - 1,
          parts.day,
          parts.hour,
          parts.minute,
          parts.second
        );

        let offset = getTimeZoneOffsetMs(new Date(utcGuess));
        let timestamp = utcGuess - offset;
        const correctedOffset = getTimeZoneOffsetMs(new Date(timestamp));

        if (correctedOffset !== offset) {
          offset = correctedOffset;
          timestamp = utcGuess - offset;
        }

        return timestamp;
      }

      const eventTimestamp = getZonedTimestamp(eventDateParts);
      const startTimestamp = getZonedTimestamp(startDateParts);

      const parts = {
        days: document.getElementById("days"),
        hours: document.getElementById("hours"),
        minutes: document.getElementById("minutes"),
        seconds: document.getElementById("seconds")
      };

      const progressBar = document.getElementById("progressBar");
      const progressText = document.getElementById("progressText");
      const progressPercent = document.getElementById("progressPercent");
      const dynamicMessage = document.getElementById("dynamicMessage");
      const footerNote = document.getElementById("footerNote");
      const backgroundAudio = document.getElementById("backgroundAudio");
      const audioToggle = document.getElementById("audioToggle");

      function pad(value, size) {
        if (size === 3) {
          return String(value);
        }
        return String(value).padStart(size, "0");
      }

      function getMessage(totalMs) {
        const totalDays = totalMs / (1000 * 60 * 60 * 24);

        if (totalMs <= 0) {
          return {
            main: "¡Feliz cumpleaños, Grecia!",
            progress: "",
            footer: "Hoy nacio papoooi!! Muchas Felicidades Grecia, disfruta mucho mucho tu dia y Dios te siga bendiciendo hoy y siempre, te quiero mucho!! 🥳🎉🎂🎁🎈"
          };
        }

        if (totalDays <= 1) {
          return {
            main: "¡Ya falta muy poquitoo, muy poquitoo!",
            progress: "",
            footer: "Cuenta regresiva final"
          };
        }

        if (totalDays <= 7) {
          return {
            main: "Tu cumpleaños ya esta casi casi aquii, Que emocion!!.",
            progress: "",
            footer: "Queda menos de una semana"
          };
        }

        if (totalDays <= 30) {
          return {
            main: "Ya meritooo ya meritoooo",
            progress: "",
            footer: "Menos de un mes restante papoooiii aaaa!!"
          };
        }

        if (totalDays <= 100) {
          return {
            main: "Ya se empieza a sentir la emoción en el aire.",
            progress: "",
            footer: "Menos de cien días"
          };
        }

        return {
          main: "Cada segundo acerca una celebración preciosa.",
          progress: "",
          footer: "Cuenta regresiva en tiempo real"
        };
      }

      function updateCountdown() {
        const now = Date.now();
        const distance = eventTimestamp - now;
        const clampedDistance = Math.max(distance, 0);

        const dayMs = 1000 * 60 * 60 * 24;
        const hourMs = 1000 * 60 * 60;
        const minuteMs = 1000 * 60;

        const days = Math.floor(clampedDistance / dayMs);
        const hours = Math.floor((clampedDistance % dayMs) / hourMs);
        const minutes = Math.floor((clampedDistance % hourMs) / minuteMs);
        const seconds = Math.floor((clampedDistance % minuteMs) / 1000);

        parts.days.textContent = pad(days, 3);
        parts.hours.textContent = pad(hours, 2);
        parts.minutes.textContent = pad(minutes, 2);
        parts.seconds.textContent = pad(seconds, 2);

        const elapsed = now - startTimestamp;
        const duration = eventTimestamp - startTimestamp;
        const progress = duration <= 0 ? 100 : Math.min(Math.max((elapsed / duration) * 100, 0), 100);

        progressBar.style.width = progress.toFixed(2) + "%";
        progressPercent.textContent = progress.toFixed(1) + "%";

        const message = getMessage(distance);
        dynamicMessage.textContent = message.main;
        progressText.textContent = message.progress;
        footerNote.textContent = message.footer + "";

        if (distance <= 0) {
          parts.days.textContent = "0";
          parts.hours.textContent = "00";
          parts.minutes.textContent = "00";
          parts.seconds.textContent = "00";
          progressBar.style.width = "100%";
          progressPercent.textContent = "100%";
        }
      }

      function setAudioToggle(label, isVisible) {
        if (!audioToggle) {
          return;
        }

        audioToggle.textContent = label;
        audioToggle.hidden = !isVisible;
      }

      async function attemptPlayback() {
        if (!backgroundAudio) {
          return false;
        }

        try {
          await backgroundAudio.play();
          setAudioToggle("Pausar música", true);
          return true;
        } catch (error) {
          setAudioToggle("Tocar para escuchar una sorpresa", true);
          return false;
        }
      }

      function enableAudioPlayback() {
        if (!backgroundAudio) {
          return;
        }

        backgroundAudio.volume = 1;

        const unlockAudio = async () => {
          const started = await attemptPlayback();

          if (started) {
            window.removeEventListener("pointerdown", unlockAudio);
            window.removeEventListener("keydown", unlockAudio);
          }
        };

        if (audioToggle) {
          audioToggle.addEventListener("click", async () => {
            if (backgroundAudio.paused) {
              await attemptPlayback();
              return;
            }

            backgroundAudio.pause();
            setAudioToggle("Reproducir música", true);
          });
        }

        attemptPlayback();
        window.addEventListener("pointerdown", unlockAudio, { passive: true });
        window.addEventListener("keydown", unlockAudio);
      }

      updateCountdown();
      enableAudioPlayback();
      setInterval(updateCountdown, 1000);
    })();
  </script>
</body>
</html>
