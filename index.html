<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cumpleaños Grecia</title>
  <meta name="description" content="Cuenta regresiva elegante para el Cumpleaños Grecia el 14 de mayo de 2026.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@200;300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-ivory: #f9f8f5;
      --bg-off: #f0eeea;
      --sage-soft: #c4d4c8;
      --sage-light: #dce8df;
      --sage-deep: #4a6e55;
      --mist-light: #d8e8f0;
      --mist-mid: #b8cdd8;
      --fog-blue: #6e9aad;
      --text-main: #2c3830;
      --text-muted: #7a9080;
      --text-soft: #a8bfb2;
      --line-soft: rgba(255, 255, 255, 0.55);
      --glass-fill: rgba(255, 255, 255, 0.26);
      --glass-strong: rgba(255, 255, 255, 0.38);
      --shadow: 0 24px 60px rgba(74, 110, 85, 0.12);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --max-card: 880px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Jost", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 15% 20%, rgba(220, 232, 223, 0.9), transparent 32%),
        radial-gradient(circle at 85% 18%, rgba(216, 232, 240, 0.75), transparent 30%),
        radial-gradient(circle at 70% 78%, rgba(196, 212, 200, 0.65), transparent 26%),
        linear-gradient(135deg, var(--bg-ivory) 0%, #f6f4ef 24%, var(--sage-light) 55%, var(--mist-light) 100%);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .scene {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(18px, 3vw, 34px);
      isolation: isolate;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
    }

    .backdrop::before,
    .backdrop::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(28px);
      opacity: 0.55;
    }

    .backdrop::before {
      width: min(42vw, 320px);
      height: min(42vw, 320px);
      left: -4%;
      top: 6%;
      background: rgba(184, 205, 216, 0.28);
    }

    .backdrop::after {
      width: min(36vw, 280px);
      height: min(36vw, 280px);
      right: -6%;
      bottom: 8%;
      background: rgba(196, 212, 200, 0.34);
    }

    .botanicals {
      position: fixed;
      inset: 0;
      z-index: -1;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .botanicals path,
    .botanicals circle,
    .botanicals ellipse,
    .botanicals line {
      vector-effect: non-scaling-stroke;
    }

    .botanicals .bouquet {
      opacity: 0.42;
      transform-origin: center bottom;
    }

    .botanicals .petal {
      stroke: rgba(201, 209, 214, 0.8);
      stroke-width: 1.2;
      stroke-linejoin: round;
    }

    .botanicals .leaf,
    .botanicals .stem {
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card {
      width: min(100%, var(--max-card));
      padding: clamp(24px, 4vw, 44px);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0.19));
      border: 1px solid rgba(255, 255, 255, 0.48);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px) saturate(125%);
      -webkit-backdrop-filter: blur(22px) saturate(125%);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: calc(var(--radius-xl) - 1px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      pointer-events: none;
    }

    .reveal {
      opacity: 0;
      transform: translateY(18px);
      animation: rise-in 900ms cubic-bezier(.2, .7, .2, 1) forwards;
    }

    .delay-1 { animation-delay: 120ms; }
    .delay-2 { animation-delay: 230ms; }
    .delay-3 { animation-delay: 340ms; }
    .delay-4 { animation-delay: 450ms; }
    .delay-5 { animation-delay: 560ms; }
    .delay-6 { animation-delay: 670ms; }

    .eyebrow {
      margin: 18px 0 0;
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--fog-blue);
      padding-left: 0.5em;
    }

    h1 {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(3rem, 7vw, 5.7rem);
      line-height: 0.92;
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 12px 0 0;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.25rem, 2.8vw, 1.8rem);
      font-style: italic;
      font-weight: 300;
      color: var(--text-muted);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: center;
      margin: 22px auto 26px;
      color: rgba(110, 154, 173, 0.7);
    }

    .divider::before,
    .divider::after {
      content: "";
      width: min(22vw, 124px);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(110, 154, 173, 0.45), transparent);
    }

    .divider svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1;
      opacity: 0.85;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: clamp(10px, 2vw, 18px);
      margin: 0 auto 28px;
    }

    .time-card {
      background: linear-gradient(180deg, var(--glass-strong), rgba(255, 255, 255, 0.17));
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: var(--radius-lg);
      padding: clamp(14px, 2vw, 20px) 10px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.42);
      min-height: 136px;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 8px;
    }

    .value {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.7rem, 6vw, 4.4rem);
      line-height: 0.9;
      font-weight: 300;
      font-variant-numeric: tabular-nums lining-nums;
      letter-spacing: 0.025em;
    }

    .label {
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding-left: 0.34em;
    }

    .progress-wrap {
      width: min(100%, 520px);
      margin: 0 auto;
    }

    .progress-track {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.35);
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(44, 56, 48, 0.04);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(138, 170, 146, 0.95), rgba(110, 154, 173, 0.95));
      box-shadow: 0 0 22px rgba(110, 154, 173, 0.22);
      transition: width 900ms ease;
    }

    .progress-copy {
      margin: 12px 0 0;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .progress-copy span:first-child:empty {
      display: none;
    }

    .message {
      margin: 24px auto 0;
      max-width: 28ch;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.45rem, 3.2vw, 2rem);
      line-height: 1.15;
      font-style: italic;
      color: var(--sage-deep);
    }

    .date-badge {
      margin: 28px auto 0;
      width: fit-content;
      max-width: 100%;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.52);
      background: rgba(255, 255, 255, 0.24);
      color: var(--text-muted);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-size: 0.74rem;
      white-space: nowrap;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .footer-note {
      margin-top: 12px;
      color: rgba(122, 144, 128, 0.9);
      font-size: 0.78rem;
      letter-spacing: 0.04em;
    }

    @keyframes rise-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 860px) {
      .card {
        max-width: 720px;
      }

      .countdown {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .time-card {
        min-height: 124px;
      }
    }

    @media (max-width: 560px) {
      body {
        overflow: auto;
      }

      .scene {
        min-height: 100dvh;
        padding: 16px;
      }

      .card {
        padding: 22px 16px 20px;
        border-radius: 24px;
      }

      .eyebrow {
        margin-top: 14px;
        font-size: 0.72rem;
        letter-spacing: 0.38em;
      }

      .subtitle {
        margin-top: 10px;
      }

      .divider {
        margin: 18px auto 20px;
        gap: 10px;
      }

      .countdown {
        gap: 10px;
        margin-bottom: 22px;
      }

      .time-card {
        min-height: 108px;
        padding: 14px 8px;
        border-radius: 18px;
      }

      .label {
        font-size: 0.64rem;
        letter-spacing: 0.26em;
      }

      .progress-copy {
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }

      .botanicals {
        transform: scale(1.08);
        transform-origin: center bottom;
      }

      .message {
        margin-top: 18px;
        max-width: 22ch;
      }

      .date-badge {
        margin-top: 22px;
        font-size: 0.68rem;
        letter-spacing: 0.18em;
        white-space: normal;
      }

      .footer-note {
        font-size: 0.74rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .reveal {
        opacity: 1;
        transform: none;
        animation: none;
      }

      .progress-bar {
        transition: none;
      }
    }
  </style>
</head>

  <main class="scene">

  <script>
    (function () {
      const eventDate = new Date("2026-05-14T00:00:00");
      const startDate = new Date("2025-05-14T00:00:00");

      const parts = {
        days: document.getElementById("days"),
        hours: document.getElementById("hours"),
        minutes: document.getElementById("minutes"),
        seconds: document.getElementById("seconds")
      };

      const progressBar = document.getElementById("progressBar");
      const progressText = document.getElementById("progressText");
      const progressPercent = document.getElementById("progressPercent");
      const dynamicMessage = document.getElementById("dynamicMessage");
      const footerNote = document.getElementById("footerNote");

      function pad(value, size) {
        if (size === 3) {
          return String(value);
        }
        return String(value).padStart(size, "0");
      }

      function getMessage(totalMs) {
        const totalDays = totalMs / (1000 * 60 * 60 * 24);

        if (totalMs <= 0) {
          return {
            main: "¡Feliz cumpleaños, Grecia!",
            progress: "",
            footer: "Hoy se celebra en grande"
          };
        }

        if (totalDays <= 1) {
          return {
            main: "¡Ya falta muy poco!",
            progress: "",
            footer: "Cuenta regresiva final"
          };
        }

        if (totalDays <= 7) {
          return {
            main: "La celebración está a la vuelta de la esquina.",
            progress: "",
            footer: "Queda menos de una semana"
          };
        }

        if (totalDays <= 30) {
          return {
            main: "Ya meritooo ya meritoooo",
            progress: "",
            footer: "Menos de un mes restante"
          };
        }

        if (totalDays <= 100) {
          return {
            main: "Ya se empieza a sentir la emoción en el aire.",
            progress: "",
            footer: "Menos de cien días"
          };
        }

        return {
          main: "Cada segundo acerca una celebración preciosa.",
          progress: "",
          footer: "Cuenta regresiva en tiempo real"
        };
      }

      function updateCountdown() {
        const now = new Date();
        const distance = eventDate.getTime() - now.getTime();
        const clampedDistance = Math.max(distance, 0);

        const dayMs = 1000 * 60 * 60 * 24;
        const hourMs = 1000 * 60 * 60;
        const minuteMs = 1000 * 60;

        const days = Math.floor(clampedDistance / dayMs);
        const hours = Math.floor((clampedDistance % dayMs) / hourMs);
        const minutes = Math.floor((clampedDistance % hourMs) / minuteMs);
        const seconds = Math.floor((clampedDistance % minuteMs) / 1000);

        parts.days.textContent = pad(days, 3);
        parts.hours.textContent = pad(hours, 2);
        parts.minutes.textContent = pad(minutes, 2);
        parts.seconds.textContent = pad(seconds, 2);

        const elapsed = now.getTime() - startDate.getTime();
        const duration = eventDate.getTime() - startDate.getTime();
        const progress = duration <= 0 ? 100 : Math.min(Math.max((elapsed / duration) * 100, 0), 100);

        progressBar.style.width = progress.toFixed(2) + "%";
        progressPercent.textContent = progress.toFixed(1) + "%";

        const message = getMessage(distance);
        dynamicMessage.textContent = message.main;
        progressText.textContent = message.progress;
        footerNote.textContent = message.footer;

        if (distance <= 0) {
          parts.days.textContent = "000";
          parts.hours.textContent = "00";
          parts.minutes.textContent = "00";
          parts.seconds.textContent = "00";
          progressBar.style.width = "100%";
          progressPercent.textContent = "100%";
        }
      }

      updateCountdown();
      setInterval(updateCountdown, 1000);
    })();
  </script>
</body>
</html>
